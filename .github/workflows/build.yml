name: Build TITAN Pro Client APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          autoconf-archive \
          libtool \
          libtool-bin \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libgdbm-dev \
          libssl-dev \
          libffi-dev \
          libsqlite3-dev \
          libbz2-dev \
          lld \
          cmake \
          unzip \
          zip

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython buildozer

    - name: Cache Buildozer global directory and local state
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        # ⚠️ КЛЮЧЕВОЕ ИЗМЕНЕНИЕ: добавили v2, чтобы аннулировать старый битый кэш
        key: ${{ runner.os }}-buildozer-v2-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-v2-

    - name: Clear Android Environment Variables
      run: |
        echo "ANDROID_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV

    - name: Build APK with Buildozer
      timeout-minutes: 45
      run: |
        (yes | buildozer -v android debug) || {
          echo "⚠️ Первая попытка упала из-за сети. Сносим поврежденные архивы и пробуем снова..."
          rm -rf ~/.buildozer/android/platform/
          buildozer clean
          yes | buildozer -v android debug
        }
      env:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    # =========================================================================
    # 🔐 ЗАКРЫТАЯ ЗОНА
    # =========================================================================
    # - name: Sign Artifact (Future Release Template)
    #   if: false
    #   uses: r0adkll/sign-android-release@v1
    #   with:
    #     releaseDirectory: bin/
    #     signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
    #     alias: ${{ secrets.ANDROID_KEY_ALIAS }}
    #     keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
    #     keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
    # =========================================================================

    - name: Rename APK with commit hash
      run: |
        cd bin/
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        for f in *.apk; do
          mv "$f" "TITAN-Pro-${SHORT_SHA}-$f"
        done

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-file
        path: bin/*.apk
        if-no-files-found: error

    # ⚙️ ЗАГЛУШКА ДЛЯ ТЕЛЕГРАМ (Спящий режим)
    - name: Send Telegram notification (Stub)
      uses: appleboy/telegram-action@v1.0.1
      if: false
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN || 'STUB_TOKEN' }}
        to: ${{ secrets.TELEGRAM_CHAT_ID || 'STUB_CHAT_ID' }}
        format: markdown
        message: |
          🚀 *TITAN Pro Client APK собран успешно!*
          
          **Ветка:** `${{ github.ref_name }}`
          **Коммит:** `${{ github.sha }}`
          **Автор:** ${{ github.actor }}
          
          📦 Готовый APK-файл прикреплен ниже.
        document: bin/*.apk

    # 🚀 ЗАГЛУШКА ДЛЯ GITHUB RELEASES (Спящий режим)
    - name: Create GitHub Release (Stub)
      uses: softprops/action-gh-release@v2
      if: false
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        name: "Release ${{ github.run_number }}"
        files: bin/*.apk
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
