name: Build TITAN Pro Client APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf automake libtool pkg-config \
          zlib1g-dev libncurses5-dev libgdbm-dev \
          libssl-dev libffi-dev libsqlite3-dev libbz2-dev \
          lld cmake unzip zip

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython buildozer

    - name: Isolate Android Environment Variables
      run: |
        echo "ANDROID_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV

    - name: Build APK with Buildozer
      timeout-minutes: 60
      env:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"
      run: |
        yes | buildozer -v android debug

    - name: Rename APK with commit hash
      id: rename_step
      run: |
        cd bin/
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        ORIGINAL_APK_PATH=$(find . -name "*.apk" | head -n 1)
        ORIGINAL_APK=$(basename "$ORIGINAL_APK_PATH")
        NEW_NAME="TITAN-Pro-${SHORT_SHA}-${ORIGINAL_APK}"
        mv "$ORIGINAL_APK_PATH" "./$NEW_NAME"
        echo "FINAL_APK_PATH=bin/$NEW_NAME" >> $GITHUB_ENV

    - name: Sign Android APK
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: bin/
        outputDirectory: signed_bin/
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Consolidate APK Path
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        SIGNED_FILE="${{ steps.sign_app.outputs.signedArtifactPath }}"
        TARGET_PATH="${{ env.FINAL_APK_PATH }}"
        rm -rf bin/*
        mv "$SIGNED_FILE" "$TARGET_PATH"
        rm -rf signed_bin/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-file
        path: ${{ env.FINAL_APK_PATH }}
        if-no-files-found: error

    - name: Generate Changelog
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "CHANGELOG_RAW<<EOF" >> $GITHUB_ENV
        git log -10 --pretty=format:"- %s" >> $GITHUB_ENV
        echo "" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Extract version from buildozer.spec
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        VERSION=$(grep -E '^version[[:space:]]*=[[:space:]]*' buildozer.spec | head -n 1 | cut -d'=' -f2 | tr -d '[:space:]' | tr -d '"' | tr -d "'")
        if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Send Telegram notification (Stub)
      uses: appleboy/telegram-action@v1.0.1
      if: false
      with:
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        format: markdown
        message: |
           *TITAN Pro Client APK собран успешно!*
          
          **Ветка:** `${{ github.ref_name }}`
          **Версия:** `v${{ env.APP_VERSION }}-${{ github.run_number }}`
          **Коммит:** `${{ github.sha }}`
          **Автор:** ${{ github.actor }}
          
          📦 APK готов к загрузке. Перейдите по ссылке ниже и скачайте артефакт:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
           *Последние изменения:*
          ${{ env.CHANGELOG_RAW }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      with:
        tag_name: v${{ env.APP_VERSION }}-${{ github.run_number }}
        name: "Release v${{ env.APP_VERSION }} (Build #${{ github.run_number }})"
        body: |
          ## Что нового в этой сборке:
          ${{ env.CHANGELOG_RAW }}
        files: ${{ env.FINAL_APK_PATH }}
        draft: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
