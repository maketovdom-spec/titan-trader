name: Build TITAN Pro APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Free disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet /opt/ghc
        df -h

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git ffmpeg wget \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          autoconf libtool libtool-bin pkg-config \
          unzip cmake libffi-dev \
          python3-dev automake \
          libssl-dev

    - name: Clear System NDK Environment
      run: |
        echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
        echo "ANDROID_NDK=" >> $GITHUB_ENV

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer python-for-android
        pip install "cython>=3.0.0,<3.1.0" "setuptools>=65.0.0,<70.0.0" wheel

    - name: Set root permission & accept licenses
      run: |
        echo "BUILDOZER_ALLOW_ROOT=1" >> $GITHUB_ENV
        echo "ANDROID_SDK_ACCEPT_LICENSES=true" >> $GITHUB_ENV

    - name: Set non-interactive mode
      run: |
        echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV
        echo "CI=true" >> $GITHUB_ENV
        echo "BUILD_IN_CI=true" >> $GITHUB_ENV

    - name: Verify main script exists
      run: |
        if [ ! -f "titan_pro.py" ]; then
          echo "❌ titan_pro.py not found!"
          exit 1
        fi

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = TITAN Pro
        package.name = titanpro
        package.domain = org.titan
        source.dir = .
        source.main = titan_pro.py
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0.0
        
        # КЛЮЧЕВОЙ ФИКС: принудительно используем Python 3.11 для хоста и таргета
        android.python_version = 3.11
        requirements = python3,kivy,aiohttp,pytz,async_timeout,openssl,certifi,pyjnius|https://github.com/kivy/pyjnius/archive/master.zip
        
        android.permissions = INTERNET,ACCESS_NETWORK_STATE,WAKE_LOCK
        android.api = 33
        android.minapi = 21
        android.ndk_api = 21
        android.ndk = 25c
        android.accept_sdk_license = True
        android.archs = armeabi-v7a, arm64-v8a
        orientation = portrait
        fullscreen = 0
        log_level = 2
        warn_on_root = 0

        [buildozer]
        log_level = 2
        warn_on_root = 0
        EOF

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      run: buildozer -v android debug

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_PATH" ]; then
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_PATH"
        else
          echo "❌ APK not found"
          exit 1
        fi

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: titan-pro-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.find_apk.outputs.apk_path }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
