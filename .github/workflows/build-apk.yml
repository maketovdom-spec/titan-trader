name: Build TITAN Pro Client APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /opt/ghc /var/lib/apt/lists/*
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf automake build-essential \
            libssl-dev libffi-dev zlib1g-dev \
            git unzip cmake \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer with OLD Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Build APK (no cache)
        env:
          BUILDOZER_ALLOW_ROOT: "1"
          ANDROID_SDK_ACCEPT_LICENSES: "true"
          DEBIAN_FRONTEND: "noninteractive"
        run: |
          yes | sdkmanager --licenses || true
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TITAN-Pro-Client-APK
          path: bin/*.apk
          retention-days: 30
