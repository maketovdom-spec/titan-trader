name: Build TITAN Pro Client APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04  # ⬅️ Вот она, новая Ubuntu!
    timeout-minutes: 240

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git ffmpeg wget ccache \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
          autoconf libtool libtool-bin pkg-config \
          unzip cmake libffi-dev python3-dev automake libssl-dev lld xvfb

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install --user buildozer==1.4.0 cython==0.29.33
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Verify files and buildozer
      run: |
        which buildozer
        if [ ! -f "buildozer.spec" ]; then echo "❌ buildozer.spec not found in root!"; exit 1; fi
        if [ ! -f "main.py" ]; then echo "❌ main.py not found!"; exit 1; fi
        if [ ! -f "titan_service.py" ]; then echo "❌ titan_service.py not found!"; exit 1; fi

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('.github/workflows/build-apk.yml', 'buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      run: |
        xvfb-run -a buildozer -v android debug
      env:
        ANDROID_SDK_ACCEPT_LICENSES: "true"
        DEBIAN_FRONTEND: "noninteractive"
        CI: "true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TITAN-Pro-Client-APK
        path: bin/*.apk
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/**/config.log
          .buildozer/**/*.log
          ~/.buildozer/**/*.log
        if-no-files-found: ignore
        retention-days: 7
