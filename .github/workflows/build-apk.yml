name: Build TITAN Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Free disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git ffmpeg wget \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk autoconf \
          libtool libtool-bin pkg-config \
          unzip cmake libffi-dev \
          python3-dev automake

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==3.0.3

    - name: Rename to main.py
      run: cp titan_pro.py main.py

    - name: Set root permission
      run: echo "BUILDOZER_ALLOW_ROOT=1" >> $GITHUB_ENV

    - name: Accept Android SDK licenses manually
      run: |
        mkdir -p $ANDROID_HOME/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
        echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" >> $ANDROID_HOME/licenses/android-sdk-license

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = TITAN Pro
        package.name = titanpro
        package.domain = org.titan
        source.dir = .
        source.main = main.py
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0.0
        requirements = python3,kivy,aiohttp,pytz,async_timeout,openssl,libffi
        android.permissions = INTERNET,ACCESS_NETWORK_STATE,WAKE_LOCK
        android.api = 33
        android.minapi = 21
        android.ndk_api = 21
        android.ndk = 25c
        android.accept_sdk_license = True
        orientation = portrait
        fullscreen = 0
        log_level = 2
        warn_on_root = 0

        [buildozer]
        log_level = 2
        warn_on_root = 0
        EOF

    - name: Build APK
      run: yes | buildozer android debug

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_PATH" ]; then
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found: $APK_PATH"
        else
          echo "APK not found"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: titan-pro-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30
