name: Build TITAN Pro Client APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Free disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /opt/ghc
          df -h

      - name: Verify main script exists
        run: |
          if [ ! -f "main.py" ]; then echo "❌ main.py not found!"; exit 1; fi
          if [ ! -f "titan_service.py" ]; then echo "❌ titan_service.py not found!"; exit 1; fi

      # ВОССТАНОВЛЕННЫЙ ШАГ: Теперь Buildozer точно будет установлен
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install "buildozer==1.5.0" "python-for-android==2024.01.21"
          pip install "cython<3.0" "setuptools>=65.0.0,<70.0.0" wheel
          pip install "Jinja2<3.1" "MarkupSafe<2.1"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('.github/workflows/build-apk.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Build APK
        env:
          ANDROID_SDK_ACCEPT_LICENSES: "true"
          DEBIAN_FRONTEND: "noninteractive"
          CI: "true"
          LDFLAGS: "-fuse-ld=lld"
        run: buildozer -v android debug

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
          if [ -n "$APK_PATH" ]; then
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "✅ APK found: $APK_PATH"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TITAN-Pro-Client-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/**/config.log
            .buildozer/**/*.log
            ~/.buildozer/**/*.log
          if-no-files-found: ignore
          retention-days: 7
