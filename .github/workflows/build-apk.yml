name: Build TITAN Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Free disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet /opt/ghc
        df -h

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git ffmpeg wget \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk autoconf \
          libtool libtool-bin pkg-config \
          unzip cmake libffi-dev \
          python3-dev automake

    - name: Export Android SDK Environment
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer "cython>=3.0.0,<3.1" "setuptools>=65.0.0,<70" wheel

    - name: Set root permission
      run: echo "BUILDOZER_ALLOW_ROOT=1" >> $GITHUB_ENV

    - name: Accept Android licenses
      run: echo "ANDROID_SDK_ACCEPT_LICENSES=true" >> $GITHUB_ENV

    - name: Verify main script exists
      run: |
        if [ ! -f "titan_pro.py" ]; then
          echo "❌ titan_pro.py not found!"
          exit 1
        fi

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = TITAN Pro
        package.name = titanpro
        package.domain = org.titan
        source.dir = .
        source.main = titan_pro.py
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0.0
        requirements = hostpython3,python3,kivy,aiohttp,pytz,async_timeout,openssl-android,certifi
        android.permissions = INTERNET,ACCESS_NETWORK_STATE,WAKE_LOCK
        android.api = 33
        android.minapi = 21
        android.ndk_api = 21
        android.ndk = 25c
        android.accept_sdk_license = True
        orientation = portrait
        fullscreen = 0
        log_level = 2
        warn_on_root = 0

        [buildozer]
        log_level = 2
        warn_on_root = 0
        EOF

    - name: Set non-interactive mode
      run: |
        echo "DEBIAN_FRONTEND=noninteractive" >> $GITHUB_ENV
        echo "CI=true" >> $GITHUB_ENV
        echo "BUILD_IN_CI=true" >> $GITHUB_ENV

    - name: Clean buildozer cache before build
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer
        echo "✅ Кэш Buildozer принудительно очищен"

    - name: Build APK
      run: buildozer -v android debug

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_PATH" ]; then
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_PATH"
        else
          echo "❌ APK not found"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: titan-pro-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30
