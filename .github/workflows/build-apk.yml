# 11. APP & ЗАПУСК (ИСПРАВЛЕННАЯ ВЕРСИЯ)
# ============================================================================
class TITANProApp(App):
    def __init__(self, **kwargs):
        super().__init__(**kwargs)
        self.title = "TITAN Pro"
        self.bot = TitanAbsoluteMonolith()
        self._loop_thread = None

    def build(self):
        global LOG_DIR
        
        # 1. Сначала пути и логирование
        init_paths(self)
        setup_logging()
        logger.info("✅ Пути и логирование инициализированы")
        
        # 2. Настройка UI (БЕЗ вызова jnius здесь!)
        Window.clearcolor = (0.1, 0.1, 0.15, 1)
        
        sm = ScreenManager()
        if not is_legal_accepted():
            sm.add_widget(LegalScreen(name='legal'))
            sm.current = 'legal'
        elif not os.path.exists(USER_DATA_FILE) or not load_user_credentials().get("token"):
            sm.add_widget(CredentialsScreen(name='credentials'))
            sm.current = 'credentials'
        elif not os.path.exists(SETTINGS_FILE):
            sm.add_widget(RiskProfileScreen(name='risk_profile'))
            sm.current = 'risk_profile'
        else:
            dash = DashboardScreen(name='dashboard')
            dash.bot = self.bot
            sm.add_widget(dash)
            sm.current = 'dashboard'
            Clock.schedule_once(self.start_bot, 0.5)
            
        return sm

    def on_start(self):
        """Вызывается Kivy ПОСЛЕ полной инициализации Android-окружения"""
        try:
            logger.info("🔄 Инициализация Android-специфичных функций...")
            get_device_id()
            init_wake_lock()
            
            global IS_LICENSED
            IS_LICENSED = check_license_status()
            logger.info(f"✅ Android инициализирован. Лицензия активна: {IS_LICENSED}")
            
            # Если мы на экране активации, обновляем Device ID на экране
            if hasattr(self.root, 'current') and self.root.current == 'activation':
                # Можно добавить обновление текста на экране, если нужно
                pass
                
        except Exception as e:
            logger.error(f"⚠️ Критическая ошибка инициализации Android: {e}", exc_info=True)

    def start_bot(self, dt):
        def run_loop():
            loop = asyncio.new_event_loop()
            asyncio.set_event_loop(loop)
            
            # КРИТИЧЕСКИ ВАЖНО: сохраняем ссылку на цикл ДО его запуска
            self.bot._loop = loop  
            
            try:
                loop.run_until_complete(self.async_main())
            finally:
                try:
                    loop.close()
                except:
                    pass
                    
        self._loop_thread = threading.Thread(target=run_loop, daemon=True)
        self._loop_thread.start()
        logger.info("✅ Асинхронный поток запущен")

    async def async_main(self):
        await self.bot.start()
        await asyncio.gather(
            ws_market_data_feed(self.bot),
            self.bot.http_polling_loop(),
            return_exceptions=True
        )

    def on_stop(self):
        if self.bot:
            logger.info("🛑 Остановка бота...")
