name: Build TITAN Pro Client APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Free disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /opt/ghc /var/lib/apt/lists/*
          df -h

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf automake build-essential \
            libssl-dev libffi-dev zlib1g-dev \
            git unzip cmake \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgstreamer1.0-0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.10
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

      - name: Cache Buildozer toolchain
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: "1"
          ANDROID_SDK_ACCEPT_LICENSES: "true"
          DEBIAN_FRONTEND: "noninteractive"
          CI: "true"
          P4A_BUILD_TIMEOUT: "600"
        run: |
          buildozer -v android debug

      - name: Find and verify APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*debug*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "APK found: $APK_PATH"
            ls -lh $APK_PATH
          else
            echo "APK not found"
            ls -R bin/ 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TITAN-Pro-Client-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-failure
          path: .buildozer/**/*.log
          if-no-files-found: ignore
          retention-days: 7
