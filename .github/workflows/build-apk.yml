name: Build TITAN Pro Client APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Free disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet /opt/ghc
        df -h

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git ffmpeg wget ccache \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev \
          zlib1g-dev libgstreamer1.0-0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          autoconf libtool libtool-bin pkg-config \
          unzip cmake libffi-dev \
          python3-dev automake \
          libssl-dev lld clang

    - name: Install Python build tools
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade buildozer python-for-android
        pip install "cython<3.0" "setuptools>=65.0.0,<70.0.0" wheel
        # FIX #1: Устанавливаем совместимые версии для модуля cgi
        pip install "Jinja2<3.1" "MarkupSafe<2.1"

    - name: Verify main script exists
      run: |
        if [ ! -f "main.py" ]; then
          echo "❌ main.py not found! Убедись, что файл переименован в main.py"
          exit 1
        fi

    - name: Create debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = TITAN Pro
        package.name = titanpro
        package.domain = org.titan.pro
        source.dir = .
        source.main = main.py
        source.include_exts = py,png,jpg,kv,atlas,json
        version = 1.0.0
        # FIX #2: Добавлены aiohttp и pytz, убрана точная версия python
        requirements = python3,kivy,aiohttp,pytz
        android.permissions = INTERNET,ACCESS_NETWORK_STATE,WAKE_LOCK,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
        android.api = 33
        android.minapi = 21
        android.ndk_api = 21
        android.ndk = 25c
        android.accept_sdk_license = True
        android.allow_insecure_keystore = True
        android.archs = arm64-v8a
        orientation = portrait
        fullscreen = 0
        log_level = 2
        warn_on_root = 0
        android.gradle_options = -Xmx2048m

        [buildozer]
        log_level = 1
        warn_on_root = 0
        EOF

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      env:
        BUILDOZER_ALLOW_ROOT: "1"
        ANDROID_SDK_ACCEPT_LICENSES: "true"
        DEBIAN_FRONTEND: "noninteractive"
        CI: "true"
        BUILD_IN_CI: "true"
      run: buildozer -v android debug

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_PATH" ]; then
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_PATH"
        else
          echo "❌ APK not found"
          exit 1
        fi

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TITAN-Pro-Client-APK
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/**/config.log
          .buildozer/**/*.log
          ~/.buildozer/**/*.log
        retention-days: 7
